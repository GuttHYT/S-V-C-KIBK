<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIBK - Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="js/notifications.js"></script>
</head>
<body>
<header>
  <h1>KIBK Lanches</h1>
  <div id="user-info" style="font-size: 0.9rem; margin-top: 5px;"></div>
</header>

  <nav style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      <div style="display: flex; gap: 15px; align-items: center;">
          <a href="dashboard.html" style="font-weight: bold; text-decoration: none; color: var(--primary-color);">Início</a>
          
          <a href="profile.html" style="text-decoration: none; color: #333;">Meu Perfil</a>

          <span id="seller-links" style="display:none;">
            <a href="vendors.html" style="text-decoration: none; color: #333;">Vender</a>
          </span>

          <span id="admin-link" style="display:none;">
            <a href="admin.html" style="text-decoration: none; color: #d32f2f; font-weight: bold;">Painel Admin</a>
          </span>
      </div>

      <div style="display: flex; align-items: center; gap: 15px;">
          <div id="noti-bell" style="display: none; cursor: pointer; position: relative;" onclick="toggleNotiBox()">
            <span style="font-size: 1.3rem;">🔔</span>
            <span id="noti-count" style="display: none; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; position: absolute; top: -5px; right: -5px;">0</span>
            
            <div id="noti-box" style="display: none; position: absolute; top: 35px; right: 0; background: white; border: 1px solid #ccc; width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 8px; z-index: 1000;">
                <div style="padding: 10px; border-bottom: 1px solid #eee; font-weight: bold;">Pedidos Recentes</div>
                <div id="noti-list"></div>
            </div>
          </div>

          <a href="#" onclick="logout()" style="text-decoration: none; color: #666; font-size: 0.9rem;">Sair</a>
      </div>
  </nav>

  <div class="container">
    <div id="announcements"></div>

    <h2 style="margin-bottom: 15px;">Salgados</h2>
    <div id="category-salgados" class="product-grid">
      </div>

    <h2 style="margin-top: 40px; margin-bottom: 15px;">Doces e Outros</h2>
    <div id="category-doces" class="product-grid">
      </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script> <script src="js/firebase-config.js"></script>
  <script src="js/main.js"></script>
</body>
<footer>
  <p>Criado por Gustavo Santana D. M.</p>
  <p>&copy; Direitos reservados 2026</p>
</footer>
</html>
