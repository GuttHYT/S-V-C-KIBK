<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - KIBK</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Estilos específicos para a Grade do Admin */
        .grid-admin {
            display: grid;
            /* Reduzi de 300px para 280px para caber melhor em celulares bem pequenos */
            grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .admin-section-title {
            border-left: 4px solid #d32f2f;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #333;
        }

        /* Base do user-row */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px; /* Aumentado para facilitar o toque */
            border-bottom: 1px solid #eee;
            gap: 10px;
            flex-wrap: wrap; /* Permite que os itens quebrem linha se necessário */
        }

        .badge-admin {
            background: #ffebee;
            color: #d32f2f;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* --- AJUSTE PARA CELULAR --- */
        @media (max-width: 480px) {
            .user-row {
                flex-direction: column; /* Empilha Nome e Botões verticalmente */
                align-items: flex-start; /* Alinha tudo à esquerda */
                gap: 12px;
            }

            /* Garante que os botões ocupem a largura total no celular se desejar */
            .user-row div:last-child {
                width: 100%;
                display: flex;
                gap: 5px;
                justify-content: flex-start;
            }
            
            .user-row .btn {
                flex: 1; /* Faz os botões dividirem o espaço igualmente no celular */
                font-size: 0.8rem;
                padding: 8px 5px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Painel do Diretor (Admin)</h1>
    </header>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <a href="dashboard.html" style="font-weight: bold; text-decoration: none; color: #333;">← Voltar ao Início</a>
        <span style="color: #d32f2f; font-weight: bold;">Modo Administrador</span>
    </nav>

    <div class="container">
        <div class="grid-admin">
            <div class="card">
                <h3 class="admin-section-title">🎨 Personalização Global</h3>
                
                <div class="admin-config-group" style="margin-bottom: 20px;">
                    <label>Nome da Loja (Título):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="cfg-name" placeholder="Ex: Cantina KIBK" style="flex: 1; padding: 8px;">
                        <button class="btn-small" onclick="saveIndividual('siteName', 'cfg-name')">💾</button>
                    </div>
                </div>

                <div class="admin-config-group" style="margin-bottom: 20px;">
                    <label>URL do Favicon (Ícone da Aba):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="cfg-favicon" placeholder="Link da imagem .ico ou .png" style="flex: 1; padding: 8px;">
                        <button class="btn-small" onclick="saveIndividual('favicon', 'cfg-favicon')">💾</button>
                    </div>
                </div>

                <div class="admin-config-group" style="margin-bottom: 20px;">
                    <label>Cor de Identidade (Botões/Header):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="color" id="cfg-color" style="flex: 1; height: 38px;">
                        <button class="btn-small" onclick="saveIndividual('themeColor', 'cfg-color')">💾</button>
                    </div>
                </div>

                <div class="admin-config-group" style="margin-bottom: 20px;">
                    <label>Mensagem de Alerta (Topo do site):</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="cfg-alert" placeholder="Ex: Hoje tem promoção de coxinha!" style="flex: 1; padding: 8px;">
                        <button class="btn-small" onclick="saveIndividual('topAlert', 'cfg-alert')">💾</button>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                
                <button class="btn" onclick="saveAllSettings()" style="background: #2E7D32; width: 100%; font-weight: bold;">
                    SALVAR TODAS AS ALTERAÇÕES
                </button>
            </div>

            <div class="card">
                <h3 class="admin-section-title">👥 Usuários e Permissões</h3>
                <div id="admin-users-list">
                    <p style="color:#999; text-align:center;">Carregando usuários...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
